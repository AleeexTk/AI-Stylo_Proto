name: CI Smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx pyyaml \
            streamlit>=1.40.0 \
            sentence-transformers>=2.2.0 \
            pillow requests pandas numpy \
            python-dotenv pydantic>=2.5.0 \
            beautifulsoup4 scikit-learn \
            fastapi sqlalchemy uvicorn

      - name: Lint (smoke)
        run: make check

      - name: Run tests
        run: pytest -q
