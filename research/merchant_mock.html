<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Store | AI-Stylo B2B Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: #f9fafb;
            color: #111827;
        }
        header {
            background: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e5e7eb;
        }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }
        .product-container {
            max-width: 1000px;
            margin: 60px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 20px;
        }
        .product-image {
            background: #eee;
            aspect-ratio: 3/4;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-meta .sizes {
            display: flex;
            gap: 10px;
        }
        .merchant-category {
            color: #6b7280;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">LUXE FASHION</div>
    <nav>Shop | About | Contact</nav>
</header>

<div class="product-container">
    <div class="product-image">
        <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&q=80&w=800" alt="Fashion Item">
    </div>
    <div class="product-info">
        <p class="merchant-category">Spring Collection</p>
        <h1>Cyberpunk Oversized Hoodie</h1>
        <div class="price">4,500 UAH</div>
        <p>Experience the future of fashion with our signature oversized hoodie. Designed for maximum comfort and style in the digital age.</p>
        
        <div class="product-meta">
            <label>Select Size</label>
            <div class="sizes">
                <div class="size-box">S</div>
                <div class="size-box active">M</div>
                <div class="size-box">L</div>
            </div>
        </div>

        <button class="btn-buy">ADD TO BAG</button>
    </div>
</div>

<!-- AI-Stylo B2B Integration -->
<script src="../../ai_stylo/web_widget/sdk.js"></script>

</body>
</html>
